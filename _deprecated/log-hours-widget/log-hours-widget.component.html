<p-card header="Log Hours">
  @if (loading()) {
    <p>Loading…</p>
  } @else {
    <form [formGroup]="form" (ngSubmit)="submit()" class="log-hours-form">
      <div class="field">
        <label for="date">Date</label>
        <p-datepicker inputId="date" formControlName="date" dateFormat="yy-mm-dd" [showIcon]="true" styleClass="w-full" />
      </div>
      <div class="field">
        <label for="hours">Hours worked</label>
        <p-inputnumber inputId="hours" formControlName="hours" [min]="0.5" [max]="24" [step]="0.5" mode="decimal" [minFractionDigits]="1" styleClass="w-full" />
      </div>
      @if (todayLog()) {
        <p class="hint">Today's entry: {{ todayLog()!.hoursWorked }} hrs (submitting again updates it).</p>
      }
      @if (errorMessage()) {
        <p class="error">{{ errorMessage() }}</p>
      }
      <p-button type="submit" label="Save Hours" icon="pi pi-check" [loading]="saving()" [disabled]="form.invalid" styleClass="w-full" />
    </form>
  }
</p-card>
