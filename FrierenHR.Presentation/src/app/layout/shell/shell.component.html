<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"><i class="pi pi-sitemap"></i></div>
      <span>FrierenHR</span>
    </div>
    <nav>
      @for (item of navItems; track item.path) {
        @if (visible(item)) {
          <a [routerLink]="item.path" routerLinkActive="active" class="nav-link">
            <i [class]="item.icon"></i><span>{{ item.label }}</span>
          </a>
        }
      }
    </nav>
    <div class="sidebar-footer">
      <button class="nav-link" type="button" (click)="logout()">
        <i class="pi pi-sign-out"></i><span>Logout</span>
      </button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="search">
        <i class="pi pi-search"></i>
        <input type="text" placeholder="Search…" />
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" type="button" aria-label="Notifications">
          <i class="pi pi-bell"></i>
        </button>
        <div class="divider"></div>
        <div class="user">
          <div class="avatar">{{ initials() }}</div>
          <div class="user-meta">
            <span class="welcome">{{ authService.currentFullName() }}</span>
            <span class="role-badge">{{ authService.currentRole() }}</span>
          </div>
        </div>
      </div>
    </header>
    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
